{% extends "layout/bootstrap.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-header text-center">

                <h3>
                    Register
                </h3>

            </div>

            <div class="card-body">

                <form action="/register" method="post">

                    <div class="mb-3">

                        <label class="form-label">
                            Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-success"
                    >
                        Register
                    </button>

                </form>

                <p class="mt-3 text-center">
                    Already have an account?
                    <a href="/login">Login here</a>
                </p>

            </div>

        </div>

    </div>
</div>
{% endblock %}
